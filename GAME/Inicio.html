<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Cut Hangman - Gamer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        :root {
            --paper-white: #f0f0f0;
            --paper-gray: #d1d1d1;
            --paper-dark: #333333;
            --ink-black: #1a1a1a;
        }

        body {
            background-color: #222;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Special Elite', system-ui, serif;
            color: var(--ink-black);
            overflow: hidden; /* Impede rolagem */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .paper-bg {
            background: var(--paper-white);
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2), 
                        inset 2px 2px 10px rgba(0,0,0,0.05);
            position: relative;
            border: 1px solid #ccc;
        }

        .torn-edge {
            clip-path: polygon(0% 0%, 5% 2%, 10% 0%, 15% 3%, 20% 0%, 25% 2%, 30% 0%, 35% 3%, 40% 0%, 45% 2%, 50% 0%, 55% 3%, 60% 0%, 65% 2%, 70% 0%, 75% 3%, 80% 0%, 85% 2%, 90% 0%, 95% 3%, 100% 0%, 100% 100%, 95% 97%, 90% 100%, 85% 98%, 80% 100%, 75% 97%, 70% 100%, 65% 98%, 60% 100%, 55% 97%, 50% 100%, 45% 98%, 40% 100%, 35% 97%, 30% 100%, 25% 98%, 20% 100%, 15% 97%, 10% 100%, 5% 98%, 0% 100%);
        }

        .scrap {
            background: var(--paper-gray);
            transform: rotate(-1deg);
            padding: 5px 10px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            display: inline-block;
        }

        .key {
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-size: 0.8rem;
        }

        .key:hover {
            transform: translateY(-2px) rotate(2deg);
            background: var(--paper-dark) !important;
            color: white !important;
        }

        .key.used {
            opacity: 0.3;
            pointer-events: none;
            text-decoration: line-through;
        }

        .hangman-part {
            stroke: var(--ink-black);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visible { opacity: 1; }

        .letter-slot {
            border-bottom: 3px solid var(--ink-black);
            width: 25px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 3px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .rank-item {
            border-bottom: 1px dashed #999;
            padding: 2px 0;
            font-size: 0.85rem;
        }

        @keyframes dropIn {
            from { transform: translateY(-100vh) rotate(15deg); }
            to { transform: translateY(0) rotate(-1deg); }
        }

        .animate-drop {
            animation: dropIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }


        .hanging-modal {
            pointer-events: none;
            perspective: 900px;
        }

        .hanging-modal .hanging-assembly {
            transform: translateY(-135vh) rotateX(20deg) rotateZ(-4deg);
            transform-origin: top center;
            opacity: 0;
        }

        .hanging-modal.open .hanging-assembly {
            animation: panelDrop3d 0.82s cubic-bezier(0.2, 0.9, 0.25, 1.15) forwards;
        }

        .hanging-modal.closing .hanging-assembly {
            animation: panelRise3d 0.5s cubic-bezier(0.55, 0.02, 0.95, 0.3) forwards;
        }

        .hanging-modal .rope {
            width: 4px;
            height: 95px;
            background: linear-gradient(to bottom, #d9d1b4, #9b8d65);
            margin: 0 auto;
            box-shadow: 1px 0 1px rgba(0,0,0,0.25);
        }

        .hanging-modal .panel-board {
            box-shadow: 8px 12px 22px rgba(0,0,0,0.26), 4px 4px 0px rgba(0,0,0,0.2), inset 2px 2px 10px rgba(0,0,0,0.05);
            transform-origin: top center;
        }

        @keyframes panelDrop3d {
            0% {
                transform: translateY(-135vh) rotateX(20deg) rotateZ(-4deg) scale(0.92);
                opacity: 0;
            }
            58% {
                transform: translateY(16px) rotateX(-8deg) rotateZ(1.4deg) scale(1.02);
                opacity: 1;
            }
            78% {
                transform: translateY(-6px) rotateX(4deg) rotateZ(-0.6deg) scale(0.995);
            }
            100% {
                transform: translateY(0) rotateX(0deg) rotateZ(0deg) scale(1);
                opacity: 1;
            }
        }

        @keyframes panelRise3d {
            0% {
                transform: translateY(0) rotateX(0deg) rotateZ(0deg) scale(1);
                opacity: 1;
            }
            25% {
                transform: translateY(4px) rotateX(-6deg) rotateZ(0.8deg) scale(1.01);
            }
            100% {
                transform: translateY(-140vh) rotateX(22deg) rotateZ(-4deg) scale(0.9);
                opacity: 0;
            }
        }

        .bot-cursor {
            position: fixed;
            width: 42px;
            height: 42px;
            border: 4px solid #111;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: left 1.2s ease-in-out, top 1.2s ease-in-out, transform 0.15s ease;
        }

        .bot-cursor.clicking {
            transform: translate(-50%, -50%) scale(0.8);
        }
    </style>
</head>
<body class="p-2 md:p-4">
    <div id="bot-cursor" class="bot-cursor"></div>

    <!-- Header Reduzido -->
    <header class="mb-4 animate-drop w-full max-w-2xl">
        <div class="paper-bg torn-edge p-3 transform -rotate-1">
            <h1 class="text-2xl md:text-4xl font-bold uppercase tracking-tighter text-center">
                FORCA <span class="bg-black text-white px-2">GAMER</span>
            </h1>
        </div>
    </header>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-4 gap-4 flex-grow overflow-hidden">
        
        <!-- Área da Forca (Ocupa mais espaço) -->
        <section class="lg:col-span-3 flex flex-col items-center justify-between space-y-2 overflow-hidden">
            <div class="paper-bg p-4 w-full flex flex-col items-center justify-around flex-grow">
                <!-- SVG Redimensionado -->
                <svg width="160" height="180" viewBox="0 0 200 250" class="max-h-[30vh]">
                    <path d="M20 230 L180 230" stroke="#333" stroke-width="6" />
                    <path d="M60 230 L60 20 L140 20 L140 50" stroke="#333" stroke-width="6" fill="none" />
                    <circle id="head" class="hangman-part" cx="140" cy="70" r="20" />
                    <line id="body-line" class="hangman-part" x1="140" y1="90" x2="140" y2="160" />
                    <line id="arm-l" class="hangman-part" x1="140" y1="110" x2="110" y2="140" />
                    <line id="arm-r" class="hangman-part" x1="140" y1="110" x2="170" y2="140" />
                    <line id="leg-l" class="hangman-part" x1="140" y1="160" x2="115" y2="200" />
                    <line id="leg-r" class="hangman-part" x1="140" y1="160" x2="165" y2="200" />
                </svg>

                <div id="word-display" class="flex flex-wrap justify-center my-2">
                    <!-- Letras -->
                </div>

                <div id="hint-display" class="scrap text-xs mb-2">
                    DICA: <span id="hint-text">Carregando...</span>
                </div>

                <div id="keyboard" class="grid grid-cols-9 gap-1 w-full max-w-lg">
                    <!-- Teclado -->
                </div>
            </div>
        </section>

        <!-- Lateral Reduzida -->
        <aside class="flex flex-col space-y-4 lg:col-span-1">
            <div class="paper-bg p-4 transform rotate-1">
                <h2 class="text-lg font-bold mb-2 border-b-2 border-black">SESSÃO</h2>
                <div class="flex justify-between items-center">
                    <span>Pontos:</span>
                    <span id="current-score" class="text-xl font-bold">0</span>
                </div>
            </div>

            <div class="paper-bg p-4 transform -rotate-1 flex-grow overflow-hidden flex flex-col">
                <div class="flex items-center justify-between gap-2 mb-2 border-b-2 border-black">
                    <h2 class="text-lg font-bold uppercase">Hall of Fame</h2>
                    <span id="hall-timer" class="text-xs font-bold">15:00</span>
                </div>
                <div id="rank-list" class="space-y-1 overflow-y-auto max-h-[150px]">
                    <p class="text-xs italic text-gray-500">Nenhum recorde ainda...</p>
                </div>
                <button onclick="resetRank()" class="mt-auto pt-2 text-[10px] uppercase underline opacity-50 hover:opacity-100">Resetar</button>
            </div>
        </aside>

    </main>

    <!-- Painel de resultado pendurado -->
    <div id="game-modal" class="hanging-modal fixed top-0 left-0 z-50 p-4" aria-live="polite">
        <div class="hanging-assembly w-72">
            <div class="rope" aria-hidden="true"></div>
            <div class="panel-board paper-bg p-6 w-72 text-center pointer-events-auto">
                <h2 id="modal-title" class="text-2xl font-bold mb-2">FIM DE JOGO</h2>
                <p id="modal-message" class="mb-4 text-sm">A palavra era: <span id="correct-word" class="font-bold underline"></span></p>
                <button onclick="startNewGame()" class="bg-black text-white px-6 py-2 uppercase font-bold hover:bg-zinc-800 w-full">Próxima</button>
            </div>
        </div>
    </div>

    <script>
        // MANTENHA TODO O SEU SCRIPT ORIGINAL ABAIXO
        const wordsDatabase = [
            { word: "MINECRAFT", hint: "Blocos e sobrevivência" },
            { word: "KRATOS", hint: "Protagonista de God of War" },
            { word: "NINTENDO", hint: "Criadora do Mario" },
            { word: "PLAYSTATION", hint: "Console da Sony" },
            { word: "ELDERING", hint: "Venceu o GOTY em 2022" },
            { word: "ZELDA", hint: "A princesa que precisa ser salva" },
            { word: "METROID", hint: "Samus Aran é a protagonista" },
            { word: "FORNITE", hint: "Battle Royale famoso por construir" },
            { word: "HALO", hint: "Master Chief é o ícone da Xbox" },
            { word: "PACMAN", hint: "Comedor de pastilhas amarelo" },
            { word: "ROBLOX", hint: "Plataforma de jogos criada por usuários" },
            { word: "WITCHER", hint: "Geralt de Rivia é o protagonista" },
            { word: "OVERWATCH", hint: "Hero Shooter da Blizzard" },
            { word: "VALORANT", hint: "FPS tático da Riot Games" },
            { word: "GENSHIN", hint: "RPG de ação em mundo aberto gratuito" },
            { word: "SONIC", hint: "O ouriço mais rápido do mundo" },
            { word: "PIKACHU", hint: "O Pokémon mais famoso" },
            { word: "GAMEBOY", hint: "Portátil clássico dos anos 90" }
        ];

        let currentWord = "";
        let currentHint = "";
        let guessedLetters = [];
        let mistakes = 0;
        const maxMistakes = 6;
        let score = 0;
        let leaderboard = JSON.parse(localStorage.getItem('hangman_gamer_rank')) || [];
        let correctPickChance = 0.05;
        const initialCorrectPickChance = 0.05;
        const chanceIncrementOnError = 0.10;
        let autoPlayTimeout = null;
        let autoContinueModalTimeout = null;
        let isGameOver = false;
        const HALL_COUNTDOWN_SECONDS = 900;
        const HALL_TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9ewDO8amUzWyWKBraTWy9kOHAEtYqLDrpUwOF9ATyubXOCj4lPhZkkgkaSKDgfIDIEF9OFxX-hWiw/pub?gid=0&single=true&output=tsv";
        let hallRemainingSeconds = HALL_COUNTDOWN_SECONDS;
        let hallTimerInterval = null;
        let pendingHallRound = {
            startedAt: Date.now(),
            closesAt: Date.now() + HALL_COUNTDOWN_SECONDS * 1000,
            words: []
        };
        let hallOfFameScores = JSON.parse(localStorage.getItem('hangman_hall_of_fame_scores')) || {};

        const wordDisplay = document.getElementById('word-display');
        const hintText = document.getElementById('hint-text');
        const keyboard = document.getElementById('keyboard');
        const scoreDisplay = document.getElementById('current-score');
        const rankList = document.getElementById('rank-list');
        const modal = document.getElementById('game-modal');
        const botCursor = document.getElementById('bot-cursor');
        const hallTimer = document.getElementById('hall-timer');
        const hangmanParts = [
            document.getElementById('head'),
            document.getElementById('body-line'),
            document.getElementById('arm-l'),
            document.getElementById('arm-r'),
            document.getElementById('leg-l'),
            document.getElementById('leg-r')
        ];

        function init() {
            renderKeyboard();
            renderRank();
            startHallCountdown();
            startNewGame();
        }

        function renderKeyboard() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            keyboard.innerHTML = "";
            letters.split("").forEach(char => {
                const btn = document.createElement('div');
                btn.textContent = char;
                btn.className = "key paper-bg text-center py-1 md:py-2 font-bold";
                btn.onclick = () => handleGuess(char, btn);
                keyboard.appendChild(btn);
            });
        }

        function startNewGame() {
            const randomEntry = wordsDatabase[Math.floor(Math.random() * wordsDatabase.length)];
            currentWord = randomEntry.word.toUpperCase();
            currentHint = randomEntry.hint;
            guessedLetters = [];
            mistakes = 0;
            isGameOver = false;
            correctPickChance = initialCorrectPickChance;
            clearTimeout(autoContinueModalTimeout);
            modal.classList.remove('open');
            modal.classList.add('closing');
            hintText.textContent = currentHint;
            hangmanParts.forEach(part => part.classList.remove('visible'));
            document.querySelectorAll('.key').forEach(k => k.classList.remove('used'));
            updateWordDisplay();
            scheduleAutoGuess();
        }

        function updateWordDisplay() {
            wordDisplay.innerHTML = "";
            let win = true;
            currentWord.split("").forEach(char => {
                const slot = document.createElement('div');
                slot.className = "letter-slot";
                if (guessedLetters.includes(char)) {
                    slot.textContent = char;
                } else {
                    slot.textContent = "";
                    win = false;
                }
                wordDisplay.appendChild(slot);
            });
            if (win) endGame(true);
        }

        function handleGuess(char, element) {
            if (guessedLetters.includes(char) || mistakes >= maxMistakes) return;
            guessedLetters.push(char);
            element.classList.add('used');
            if (currentWord.includes(char)) {
                correctPickChance = initialCorrectPickChance;
                updateWordDisplay();
            } else {
                mistakes++;
                correctPickChance = Math.min(1, correctPickChance + chanceIncrementOnError);
                if (mistakes <= maxMistakes) {
                    hangmanParts[mistakes - 1].classList.add('visible');
                }
                if (mistakes >= maxMistakes) {
                    endGame(false);
                }
            }

            if (!isGameOver) scheduleAutoGuess();
        }

        function endGame(isWin) {
            const title = document.getElementById('modal-title');
            const msg = document.getElementById('modal-message');
            const correctWordDisplay = document.getElementById('correct-word');
            isGameOver = true;
            clearTimeout(autoPlayTimeout);
            modal.classList.remove('closing');
            modal.classList.add('open');
            correctWordDisplay.textContent = currentWord;
            pendingHallRound.words.push({ value: currentWord, matched: false, matchedBy: null, matchedAt: null });
            scheduleAutoContinueModal();
            if (isWin) {
                title.textContent = "VITÓRIA!";
                title.className = "text-2xl font-bold mb-2 text-green-800";
                score += 100 + (maxMistakes - mistakes) * 10;
                scoreDisplay.textContent = score;
            } else {
                title.textContent = "GAME OVER";
                title.className = "text-2xl font-bold mb-2 text-red-800";
            }
        }

        function getRandomDelayMs() {
            const seconds = 5 + Math.random() * 15;
            return Math.floor(seconds * 1000);
        }

        function getAvailableLetters() {
            return [...document.querySelectorAll('.key')].filter(btn => !btn.classList.contains('used'));
        }

        function pickNextLetter() {
            const availableButtons = getAvailableLetters();
            if (availableButtons.length === 0) return null;

            const correctButtons = availableButtons.filter(btn => currentWord.includes(btn.textContent));
            const wrongButtons = availableButtons.filter(btn => !currentWord.includes(btn.textContent));
            const shouldPickCorrect = Math.random() < correctPickChance;

            let pool = availableButtons;
            if (shouldPickCorrect && correctButtons.length > 0) pool = correctButtons;
            if (!shouldPickCorrect && wrongButtons.length > 0) pool = wrongButtons;

            return pool[Math.floor(Math.random() * pool.length)];
        }

        function moveBotCursorToElement(element, onArrive) {
            const rect = element.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            botCursor.style.left = `${x}px`;
            botCursor.style.top = `${y}px`;

            setTimeout(() => {
                botCursor.classList.add('clicking');
                setTimeout(() => {
                    botCursor.classList.remove('clicking');
                    onArrive();
                }, 140);
            }, 1200);
        }


        function scheduleAutoContinueModal() {
            clearTimeout(autoContinueModalTimeout);
            autoContinueModalTimeout = setTimeout(() => {
                if (!isGameOver || !modal.classList.contains('open')) return;
                const nextButton = modal.querySelector('button');
                if (!nextButton) return;
                moveBotCursorToElement(nextButton, () => {
                    if (!isGameOver || !modal.classList.contains('open')) return;
                    nextButton.click();
                });
            }, 5000);
        }

        function scheduleAutoGuess() {
            clearTimeout(autoPlayTimeout);
            if (isGameOver) return;
            autoPlayTimeout = setTimeout(() => {
                if (isGameOver) return;
                const targetButton = pickNextLetter();
                if (!targetButton) return;
                moveBotCursorToElement(targetButton, () => {
                    if (isGameOver || targetButton.classList.contains('used')) return;
                    handleGuess(targetButton.textContent, targetButton);
                });
            }, getRandomDelayMs());
        }
        function renderRank() {
            rankList.innerHTML = "";
            const hallEntries = Object.entries(hallOfFameScores)
                .map(([name, points]) => ({ name, points }))
                .sort((a, b) => b.points - a.points)
                .slice(0, 10);
            if (hallEntries.length === 0) {
                rankList.innerHTML = `<p class="text-xs italic text-gray-500">Nenhum recorde ainda...</p>`;
                return;
            }
            hallEntries.forEach((entry, index) => {
                const item = document.createElement('div');
                item.className = "rank-item flex justify-between items-center";
                item.innerHTML = `<span>${index + 1}. ${entry.name}</span><b>${entry.points}</b>`;
                rankList.appendChild(item);
            });
        }

        function resetRank() {
            if (confirm("Resetar ranking?")) {
                localStorage.removeItem('hangman_gamer_rank');
                localStorage.removeItem('hangman_hall_of_fame_scores');
                leaderboard = [];
                hallOfFameScores = {};
                pendingHallRound = {
                    startedAt: Date.now(),
                    closesAt: Date.now() + HALL_COUNTDOWN_SECONDS * 1000,
                    words: []
                };
                renderRank();
            }
        }

        function formatRemainingTime(totalSeconds) {
            const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            return `${minutes}:${seconds}`;
        }

        function normalizeText(text) {
            return text
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toUpperCase()
                .replace(/[^\p{L}\p{N}\s]/gu, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function escapeRegex(text) {
            return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function commentContainsWord(comment, word) {
            const normalizedComment = normalizeText(comment);
            const normalizedWord = normalizeText(word);
            if (!normalizedComment || !normalizedWord) return false;
            const pattern = new RegExp(`(?:^|\\s)${escapeRegex(normalizedWord)}(?:\\s|$)`, 'u');
            return pattern.test(normalizedComment);
        }

        function parseRankCommentsFromTsv(tsvText) {
            const lines = tsvText.split(/\r?\n/);
            const comments = [];
            for (let i = 0; i < lines.length; i++) {
                const rowCells = lines[i].split('\t').map(cell => cell.trim()).filter(Boolean);
                for (const cell of rowCells) {
                    if (cell.startsWith('@')) {
                        let comment = "";
                        for (let j = i + 1; j < lines.length; j++) {
                            const nextCells = lines[j].split('\t').map(c => c.trim()).filter(Boolean);
                            if (nextCells.length > 0) {
                                comment = nextCells[0];
                                break;
                            }
                        }
                        comments.push({ user: cell, comment, order: comments.length });
                    }
                }
            }
            return comments;
        }

        async function processHallOfFameCycle() {
            if (pendingHallRound.words.length === 0) return;
            try {
                const response = await fetch(HALL_TSV_URL);
                if (!response.ok) throw new Error("Falha ao carregar TSV");
                const tsvText = await response.text();
                const comments = parseRankCommentsFromTsv(tsvText);
                const unresolvedWords = pendingHallRound.words.filter(word => !word.matched);

                for (const item of comments) {
                    const idx = unresolvedWords.findIndex(word => commentContainsWord(item.comment, word.value));
                    if (idx !== -1) {
                        hallOfFameScores[item.user] = (hallOfFameScores[item.user] || 0) + 100;
                        unresolvedWords[idx].matched = true;
                        unresolvedWords[idx].matchedBy = item.user;
                        unresolvedWords[idx].matchedAt = Date.now();
                        unresolvedWords.splice(idx, 1);
                        if (unresolvedWords.length === 0) break;
                    }
                }

                pendingHallRound = {
                    startedAt: Date.now(),
                    closesAt: Date.now() + HALL_COUNTDOWN_SECONDS * 1000,
                    words: []
                };
                localStorage.setItem('hangman_hall_of_fame_scores', JSON.stringify(hallOfFameScores));
                renderRank();
            } catch (error) {
                console.error("Erro ao processar Hall of Fame:", error);
            }
        }

        function startHallCountdown() {
            hallRemainingSeconds = HALL_COUNTDOWN_SECONDS;
            pendingHallRound.startedAt = Date.now();
            pendingHallRound.closesAt = Date.now() + HALL_COUNTDOWN_SECONDS * 1000;
            hallTimer.textContent = formatRemainingTime(hallRemainingSeconds);
            if (hallTimerInterval) clearInterval(hallTimerInterval);
            hallTimerInterval = setInterval(async () => {
                hallRemainingSeconds--;
                hallTimer.textContent = formatRemainingTime(Math.max(hallRemainingSeconds, 0));
                if (hallRemainingSeconds <= 0) {
                    clearInterval(hallTimerInterval);
                    await processHallOfFameCycle();
                    startHallCountdown();
                }
            }, 1000);
        }

        window.startNewGame = startNewGame;

        window.onkeydown = (e) => {
            if (!isGameOver) {
                const key = e.key.toUpperCase();
                if (/^[A-Z]$/.test(key)) {
                    const keys = document.querySelectorAll('.key');
                    for (let k of keys) {
                        if (k.textContent === key) {
                            handleGuess(key, k);
                            break;
                        }
                    }
                }
            } else if (e.key === "Enter" && modal.classList.contains('open')) {
                startNewGame();
            }
        };

        init();
    </script>
</body>
</html>
